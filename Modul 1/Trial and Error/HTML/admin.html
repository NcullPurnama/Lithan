<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" type="text/css" href="ABC.css">
    <link rel="stylesheet" href="https://www.w3schools.com/w3css/4/w3.css">
    <link rel="stylesheet" type="text/css" href="ABC-Register.css">
</head>
    <body onload="showdata()">
        <div class="container">
            <div class="validation">
                <div class="validasi">
                    <form method="POST" onSubmit="window.location.reload()" class="form1" id="adminform" name="personDetail">
                        <div class="validation">
                            <div class="validasi">
                                <h2 style="text-align: center;">Register</h2>
                                <p>
                                    <label>First Name:</label>
                                    <input type="text" id="name" name="fname" placeholder="First name..." />
                                </p>
                                <p>
                                    <label>Last name:</label>
                                    <input type="text" id="last-name" name="lname" placeholder="last name..." />
                                </p>
                                <p>
                                    <label>Email:</label>
                                    <input type="email" id="email" name="email" placeholder="input email..." />
                                </p>
                                <p>
                                    <label>Course:</label>
                                    <select id="course" name="course">
                                        <option value="html">Html</option>
                                        <option value="java">Java</option>
                                        <option value="Microsoft Office">M.Office</option>
                                        <option value=".NET">.NET</option>
                                    </select>
                                </p>
                                <div class="register">
                                    <p>
                                        <input id="submit-btn" type="submit" name="submit" value="submit">
                                    </p>
                                </div>
                                <div id="respons"></div>
                            </div>
                        </div>

                        <div class="button_blok">
                            <input type="button" class="click" value="Add" onclick="addPerson()"> 
                            <input type="button" class="click" value="Edit" onclick="editPerson()"> 
                            <input type="button" class="click" value="Delete" onclick="deletePerson()">
                        </div>

                        <div id="result-blok">
                            <h2>Learners Registration Details</h2>
                            <table id="list"></table>
                            <p>
                                <label class="click"><input type="button" class="click" value="Clear" onclick="clearAll()"></label>
                                <i>* Removes all records</i>
                            </p>
                        </div>
    
                    </form>
                </div>
            </div>
        </div>

        <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.3.1/jquery.min.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/jquery-validation@1.17.0/dist/jquery.validate.js"></script>
        <script src="leadform.js"></script>
        
    </body>
</html>
