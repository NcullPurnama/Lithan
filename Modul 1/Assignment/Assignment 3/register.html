<!DOCTYPE html>
<html lang="en">
    <head>
        <title>ABC LEARNING CENTER</title>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <link rel="stylesheet" type="text/css" href="ABC.css">
        <link rel="stylesheet" href="https://www.w3schools.com/w3css/4/w3.css">
        <link rel="stylesheet" type="text/css" href="ABC-Register.css">
    </head>


    <body>
        <div class="site-branding">
            <div class="grid-container-1">

                <div class="grid-item-1">
                    <img src="logo.jpeg" title="ABC Learning Center"  rel="home">
                </div>

                <div class="grid-item-1">
                        <h1 title="ABC Learning Center"  rel="home">ABC Learning Center</h1>
                </div>

            </div>
        </div>

       <div class="clear"></div>

        <div class="scrollmenu">
            <a href="Home.html">Home</a>
            <a href="Course.html">Course</a>
            <a href="AboutUs.html">About Us</a>
        </div>

        <nav></nav>
        
        <section>
            <article>
                <h3>Registration Form</h3>
        
                <div class="container">
                    <form action="/action_page.php">
                        <label for="name">Name</label>
                        <input type="text" id="name" name="name" required placeholder="Your name..">

                        <br>
                    
                        <label for="pnumber">Phone Number</label>
                        <br>
                        <input type="pnumber" id="pnumber" name="pnumber" required placeholder="Your phone number..">

                        <br>

                        <label for="email">Email Address</label>
                        <input type="text" id="email" name="email" required placeholder="Your email address..">

                        <br>
                    
                        <label for="course">Course</label>
                        <select id="course" name="course">
                        <option value="http">HTTP</option>
                        <option value="java">Java</option>
                        <option value="net">.Net</option>
                        <option value="moffice">Microsoft Office</option>
                        </select>

                        <br>


                        <p>Evidence of transfer:</p>

                        <form action="/action_page.php">
                            <input type="file" id="myFile" name="filename">
                        </form>
                        
                        <br>

                        <input type="submit" value="Submit">
                    </form>
                </div>
            </article>
        </section>
        
    </body>
</html>
